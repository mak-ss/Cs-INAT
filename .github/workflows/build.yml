name: Build

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '*.md'

# Yazma izni verilmesi şart
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Checkout Builds Branch
        uses: actions/checkout@v4
        with:
          ref: "builds"
          path: "builds"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin' # Adoptium'un güncel adı
          cache: 'gradle'

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson
          
          # build/ içindeki cs3 dosyalarını builds/ klasörüne taşı
          # NOT: **/build/*.cs3 yapısı eğer alt klasörlerdeyse çalışır
          find . -name "*.cs3" -exec cp {} $GITHUB_WORKSPACE/builds/ \;
          cp build/plugins.json $GITHUB_WORKSPACE/builds/ || true

      - name: Push builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          # Değişiklik var mı kontrol et
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit --amend -m "Build $GITHUB_SHA" || git commit -m "Build $GITHUB_SHA"
            git push --force
          else
            echo "Değişiklik yok, commit edilmedi."
          fi
